name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "src/**"
              - "static/**"
              - "pnpm-lock.yaml"
              - "package.json"
              - "tsconfig.json"
              - "svelte.config.*"
              - "vite.config.*"
            rust:
              - "src-tauri/**"

  typecheck:
    name: TypeScript Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm check

  test-rust:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: "rust-tauri"

      - name: Run tests
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CFLAGS: "-U__ARM_FEATURE_MATMUL_INT8 -mmacosx-version-min=11.0"
          CXXFLAGS: "-U__ARM_FEATURE_MATMUL_INT8 -mmacosx-version-min=11.0"
        run: cargo test --manifest-path src-tauri/Cargo.toml
