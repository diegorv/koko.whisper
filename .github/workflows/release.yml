name: Release

on:
  push:
    tags:
      - "*.*.*-beta"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag is on main branch
        run: |
          set -euo pipefail
          TAG_COMMIT=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Release tag ${{ github.ref_name }} is not on the main branch. Aborting."
            exit 1
          fi
          echo "Validated: ${{ github.ref_name }} is on main branch"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: "rust-tauri"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript checks
        run: pnpm check

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # Find the previous tag
          PREV_TAG=$(git tag --list --sort=-version:refname | grep -v "^${TAG}$" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            # First release — use all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$TAG" | grep -v "^- chore: bump version")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}" | grep -v "^- chore: bump version")
          fi
          # Store in output (handle multiline)
          {
            echo "commits<<CHANGELOG_EOF"
            echo "$COMMITS"
            echo "CHANGELOG_EOF"
            echo "prev_tag=${PREV_TAG:-}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            ## What's Changed

            ${{ steps.changelog.outputs.commits }}

            ${{ steps.changelog.outputs.prev_tag && format('**Full diff:** [{0}...{1}](https://github.com/{2}/compare/{0}...{1})', steps.changelog.outputs.prev_tag, github.ref_name, github.repository) || '' }}

            ## Verify download integrity

            After downloading, verify the SHA-256 checksum against the `checksums-sha256.txt` file:

            ```bash
            shasum -a 256 <downloaded-file>
            ```

            Compare the output with the corresponding entry in `checksums-sha256.txt`.
          releaseDraft: false
          prerelease: true

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle
          CHECKSUM_FILE="checksums-sha256.txt"
          find . -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) | sort | sed 's|^\./||' | while read -r file; do
            shasum -a 256 "$file" >> "$CHECKSUM_FILE"
          done
          echo "--- Checksums ---"
          cat "$CHECKSUM_FILE"

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.ref_name }}" \
            src-tauri/target/release/bundle/checksums-sha256.txt \
            --clobber
